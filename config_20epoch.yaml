project_name: UQ-HyQNet
seed: 42
data_dir: data
output_dir: outputs_20epoch
image_size: 224
batch_size: 8
epochs: 20
learning_rate: 0.00005
num_workers: 2
model_name: hybrid_quantum

# Transfer learning settings:
# freeze_backbone keeps most MobileNetV2 layers fixed.
# unfreeze_last_n_blocks adapts only the final blocks to MRI images.
freeze_backbone: true
unfreeze_last_n_blocks: 3
pretrained_backbone: true

n_qubits: 4
n_quantum_layers: 2
dropout: 0.3
val_ratio: 0.15
test_ratio: 0.15

# Use weighted loss because class counts are not perfectly balanced.
use_class_weights: true

# Keep MC dropout for uncertainty. Lower this to 5 if evaluation is too slow.
mc_dropout_samples: 20

# Include lower thresholds because 4-class confidence can be below 0.5,
# especially for undertrained uncertainty-aware models.
confidence_thresholds: [0.25, 0.3, 0.35, 0.4, 0.5, 0.6, 0.7, 0.8, 0.9]

early_stopping_patience: 8
gradcam_examples_per_class: 3
device: auto
